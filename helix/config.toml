theme = "gruvbox"

[editor]
color-modes = true
scrolloff = 8

[editor.soft-wrap]
enable = true

[editor.indent-guides]
render = true

[editor.whitespace.render]
tab = "all"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.insert]
j = { k = "normal_mode" }

#[editor.lsp]
#display-inlay-hints = true
