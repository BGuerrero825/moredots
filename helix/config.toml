theme = "gruvbox"

[editor]
cursorline = true
color-modes = true
scrolloff = 8
true-color = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true

[editor.statusline]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
